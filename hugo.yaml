baseURL: https://www.luizpicanco.com
disablePathToLower: true
locale: pt-br
defaultContentLanguage: pt
title: Programando na Madrugada

module:
  imports:
    - path: github.com/imfing/hextra

menu:
  main:
    - name: Blog
      pageRef: /
      weight: 1
    - identifier: projects
      pageRef: /projects
      weight: 2
    - identifier: about
      pageRef: /about
      weight: 3
    - identifier: search
      weight: 4
      params:
        type: search
    - name: GitHub
      weight: 5
      url: "https://github.com/lpicanco"
      params:
        icon: github
    - identifier: rss
      url: "/index.xml"
      weight: 6
      params:
        icon: rss
    - name: Theme
      weight: 7
      params:
        type: theme-toggle

params:
  footer:
    displayPoweredBy: false
    displayCopyright: true
        
outputs:
  home: [html, llms, rss]