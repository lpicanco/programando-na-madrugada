baseURL: https://www.luizpicanco.com
disablePathToLower: true
defaultContentLanguage: pt

module:
  imports:
    - path: github.com/imfing/hextra

languages:
  pt:
    label: Português
    locale: pt-br
    weight: 1
    title: Programando na Madrugada
    menu:
      main:
        - name: Blog
          pageRef: /
          weight: 1
        - identifier: projects
          pageRef: /projects
          weight: 2
        - identifier: about
          pageRef: /about
          weight: 3
        - identifier: search
          weight: 4
          params:
            type: search
        - name: GitHub
          weight: 5
          url: "https://github.com/lpicanco"
          params:
            icon: github
        - identifier: rss
          url: "/index.xml"
          weight: 6
          params:
            icon: rss
        - identifier: language
          weight: 7
          params:
            type: language-switch
            label: true
        - name: Theme
          weight: 8
          params:
            type: theme-toggle
  en:
    label: English
    locale: en-us
    weight: 2
    title: Programando na Madrugada
    menu:
      main:
        - name: Blog
          pageRef: /
          weight: 1
        - identifier: projects
          pageRef: /projects
          weight: 2
        - identifier: about
          pageRef: /about
          weight: 3
        - identifier: search
          weight: 4
          params:
            type: search
        - name: GitHub
          weight: 5
          url: "https://github.com/lpicanco"
          params:
            icon: github
        - identifier: rss
          url: "/index.xml"
          weight: 6
          params:
            icon: rss
        - identifier: language
          weight: 7
          params:
            type: language-switch
            label: true
        - name: Theme
          weight: 8
          params:
            type: theme-toggle

params:
  footer:
    displayPoweredBy: false
    displayCopyright: true

outputs:
  home: [html, llms, rss]
