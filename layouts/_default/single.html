{{ define "main" }}
  <div class="hx:mx-auto hx:flex hextra-max-page-width">
    <article class="hx:w-full hx:break-words hx:flex hx:min-h-[calc(100vh-var(--navbar-height))] hx:min-w-0 hx:justify-center hx:pb-8 hx:pr-[calc(env(safe-area-inset-right)-1.5rem)]">
      <main id="content" class="hx:w-full hx:min-w-0 hx:px-6 hx:pt-4 hx:md:px-12">
        {{ partial "breadcrumb.html" (dict "page" . "enable" false) }}
        {{ if .Title }}
          <h1 class="hx:mt-2 hx:text-4xl hx:font-bold hx:tracking-tight hx:text-slate-900 hx:dark:text-slate-100">{{ .Title }}</h1>
        {{ end }}
        <div class="content">
          {{ .Content }}
        </div>
      </main>
    </article>
    {{ partial "author-sidebar.html" . }}
  </div>
{{ end }}
