{{- with .Params.comments -}}
  <section class="content" style="margin-top:3rem;padding-top:1.5rem;border-top:1px solid rgba(125,125,125,.3)">
    <h2>{{ len . }} Comentário{{ if gt (len .) 1 }}s{{ end }}</h2>
    {{- range . }}
      {{- $hash := sha256 (lower (trim (.email | default "") " ")) -}}
      <div style="margin:1rem 0;padding:.75rem 1rem;border:1px solid rgba(125,125,125,.25);border-radius:.5rem">
        <div style="display:flex;align-items:center;gap:.5rem;font-size:.875rem">
          <img src="https://www.gravatar.com/avatar/{{ $hash }}?s=64&d=identicon" alt="" width="32" height="32" style="width:32px;height:32px;border-radius:50%;flex-shrink:0" loading="lazy">
          <span><strong>{{ .author }}</strong> <span style="opacity:.55">· {{ .date }}</span></span>
        </div>
        <p style="margin-top:.4rem;line-height:1.7;white-space:pre-line">{{ .content }}</p>
      </div>
    {{- end }}
  </section>
{{- end -}}
